<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultGG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-text">VaultGG</div>
      </div>
      <div class="sidebar-profile" id="sidebar-profile"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="lang-toggle">
          <button class="lang-btn active" id="btn-pt" onclick="window.setLang('pt-BR')">PT</button>
          <button class="lang-btn" id="btn-en" onclick="window.setLang('en')">EN</button>
        </div>
        <div class="api-status">
          <span class="status-dot offline" id="status-dot"></span>
          <span id="status-label">...</span>
        </div>
      </div>
    </aside>

    <main class="main-area">
      <div class="glow-orb glow-1"></div>
      <div class="glow-orb glow-2"></div>
      <div id="main-content" class="page-content"></div>
    </main>

    <nav class="mobile-nav" id="mobile-nav"></nav>
  </div>

  <div id="toast-container"></div>

  <!--
    =====================================================
    CONFIGURAÇÃO DA API — EDITE AQUI
    =====================================================
    Opção 1 — Backend local (rode o servidor Express):
      window.API_BASE = 'http://localhost:8080/api';

    Opção 2 — Usar o backend hospedado no Replit:
      Substitua pela URL pública do seu projeto Replit,
      exemplo:
      window.API_BASE = 'https://SEU-PROJETO.replit.app/api';
    =====================================================
  -->
  <script>
    window.API_BASE = 'http://localhost:8080/api';
  </script>
  <script src="app.js"></script>
</body>
</html>
